<div class="flex items-center justify-center" style="min-height: 100vh;">
  <div class="glass-panel" style="width: 100%; max-width: 400px;">
    <h2 class="text-center mb-4" style="font-size: 1.5rem; font-weight: 600;">Welcome Back</h2>
    
    <div *ngIf="error" class="mb-4 text-center" style="color: var(--danger); font-size: 0.9rem;">
      {{ error }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" formControlName="username" class="form-control" placeholder="Enter your username">
      </div>
      
      <div class="form-group mb-4">
        <label class="form-label">Password</label>
        <input type="password" formControlName="password" class="form-control" placeholder="Enter your password">
      </div>

      <button type="submit" class="btn btn-primary mb-4" style="width: 100%;" [disabled]="!loginForm.valid">
        Sign In
      </button>

      <div class="text-center" style="font-size: 0.9rem;">
        Don't have an account? <a routerLink="/signup" style="color: var(--primary-color); text-decoration: none;">Sign up</a>
      </div>
    </form>
  </div>
</div>
