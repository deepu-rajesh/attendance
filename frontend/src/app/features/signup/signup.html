<div class="flex items-center justify-center" style="min-height: 100vh;">
  <div class="glass-panel" style="width: 100%; max-width: 500px;">
    <h2 class="text-center mb-4" style="font-size: 1.5rem; font-weight: 600;">Create Account</h2>
    
    <div *ngIf="error" class="mb-4 text-center" style="color: var(--danger); font-size: 0.9rem;">
      {{ error }}
    </div>

    <div *ngIf="success" class="mb-4 text-center" style="color: var(--success); font-size: 1rem;">
      Account created successfully! It is currently pending admin verification. You will be able to log in once an admin verifies your account.
      <div class="mt-4">
        <a routerLink="/login" class="btn btn-primary" style="text-decoration: none;">Go to Login</a>
      </div>
    </div>

    <form *ngIf="!success" [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="flex gap-4">
        <div class="form-group" style="flex: 1;">
          <label class="form-label">First Name</label>
          <input type="text" formControlName="first_name" class="form-control">
        </div>
        <div class="form-group" style="flex: 1;">
          <label class="form-label">Last Name</label>
          <input type="text" formControlName="last_name" class="form-control">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" formControlName="username" class="form-control">
      </div>
      
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" formControlName="email" class="form-control">
      </div>

      <div class="form-group mb-4">
        <label class="form-label">Password</label>
        <input type="password" formControlName="password" class="form-control">
      </div>

      <div class="form-group mb-4">
        <label class="form-label">Role</label>
        <select formControlName="role" class="form-control">
          <option value="employee">Employee</option>
          <option value="manager">Manager</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary mb-4" style="width: 100%;" [disabled]="!signupForm.valid">
        Sign Up
      </button>

      <div class="text-center" style="font-size: 0.9rem;">
        Already have an account? <a routerLink="/login" style="color: var(--primary-color); text-decoration: none;">Log in</a>
      </div>
    </form>
  </div>
</div>
